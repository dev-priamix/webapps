<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PWA 30 Secondi</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f2f5; }
        #status { color: #666; margin-top: 20px; }
        button { padding: 20px; font-size: 1.2rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="config" data-intervallo="30">
        <h1>Notifiche ogni 30s</h1>
        <button id="btnNotifiche">Attiva Ciclo Notifiche</button>
        <p id="status">Stato: In attesa...</p>
    </div>

    <script>
        const config = document.getElementById('config');
        const secondi = parseInt(config.dataset.intervallo); // Legge "30"

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log("SW registrato.");
            });
        }

        document.getElementById('btnNotifiche').addEventListener('click', () => {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') {
                    document.getElementById('status').innerText = "Stato: Sistema Avviato!";
                    
                    navigator.serviceWorker.ready.then(reg => {
                        // Mandiamo il comando di start
                        reg.active.postMessage({
                            type: 'START_TIMER',
                            secondi: secondi
                        });
                    });
                }
            });
        });
    </script>
</body>
</html>
