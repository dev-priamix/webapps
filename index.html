<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PWA 30s Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; }
        #log { margin-top: 20px; font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h2>PWA Android Test</h2>
        <button id="btn">ATTIVA LOOP 30s</button>
        <div id="log">Stato: In attesa...</div>
    </div>

    <script>
        const log = document.getElementById('log');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => log.innerText = "1. Service Worker Registrato");
        }

        document.getElementById('btn').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                log.innerText = "2. Permesso OK. Invio comando...";
                const reg = await navigator.serviceWorker.ready;
                reg.active.postMessage({ action: 'START_TIMER' });
            } else {
                log.innerText = "ERRORE: Permesso negato!";
            }
        });
    </script>
</body>
</html>
