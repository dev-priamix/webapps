<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>PWA Counter 30s</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #eef2f3; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; margin-bottom: 20px; }
        #timer-display { font-size: 48px; font-weight: bold; color: #007bff; margin: 10px 0; }
        #debug { text-align: left; font-size: 12px; background: #333; color: #0f0; padding: 10px; border-radius: 5px; height: 120px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Push Control</h2>
        <button id="btn">Attiva pushNotification()</button>
        <div>Prossima notifica tra:</div>
        <div id="timer-display">30</div>
        <div id="debug">Log: In attesa...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
