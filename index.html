<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="apple-touch-icon" href="https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png">

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <title>PWA 30s Loop</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 320px; margin: auto; }
        #timer-display { font-size: 60px; font-weight: bold; color: #007bff; margin: 20px 0; }
        button { background: #007bff; color: white; border: none; padding: 15px 20px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; }
        #log { margin-top: 20px; font-size: 11px; color: #666; text-align: left; background: #ddd; padding: 10px; border-radius: 5px; height: 80px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <form id="aggiungi_cibo" class="center">
            <label for="scadenza">Scadenza:</label>
                <input type="date" name="scadenza" id="scadenza" required>
            <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome" required>
            <label for="codice">Codice:</label>
                <input type="text" name="codice" id="codice">

            <input id="invia" type="submit" value="Aggiungi">
        </form>
    </div>

    <div class="card" id="lista">

    </div>
    <script src="script.js"></script>
</body>
</html>
