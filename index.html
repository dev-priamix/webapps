<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagnaMagna PWA</title>
    <link rel="manifest" href="manifest.json">

    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; margin: 10px auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        input[type="submit"] { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #test_notifica { background: #28a745; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 95%; margin-top: 10px; font-weight: bold; }
        #elimina_tutto {
            background: #dc3545; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 95%; margin-top: 10px; font-weight: bold;
        }
        #lista { text-align: left; margin-top: 20px; }
        hr { border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Aggiungi Scadenza</h2>
        <form id="aggiungi_cibo">
            <input type="date" id="scadenza" required>
            <input type="text" id="nome" placeholder="Nome cibo" required>
            <input type="text" id="codice" placeholder="Codice/Note">
            <input type="submit" value="Aggiungi">
        </form>
        <button id="test_notifica">🔔 Test Notifica Immediata</button>
        <button id="elimina_tutto">🗑️ Elimina Tutto</button>
    </div>

    <div class="card" id="lista">
        </div>

    <script src="script.js"></script>
</body>
</html>
