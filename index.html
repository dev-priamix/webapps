<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagnaMagna</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png" type="image/png">

    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; margin: 10px auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        input[type="submit"] { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        #lista { text-align: left; font-size: 14px; }
        hr { border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Aggiungi Cibo</h2>
        <form id="aggiungi_cibo">
            <label>Scadenza:</label>
            <input type="date" id="scadenza" required>
            <label>Nome:</label>
            <input type="text" id="nome" placeholder="es. Latte" required>
            <label>Codice/Note:</label>
            <input type="text" id="codice" placeholder="es. Frigo">
            <input id="invia" type="submit" value="Aggiungi">
        </form>
    </div>

    <div class="card" id="lista">
        </div>

    <script src="script.js"></script>
</body>
</html>
